<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gyeldhoung General Shop Billing</title>
    <link rel="stylesheet" href="./style.css">
    <link rel="icon" href="./assets/logo.svg" type="image/svg">
</head>

<body>
    <header>
        <h1>Gyeldhoung App</h1>
    </header>

    <!-- Fullscreen Loading Overlay -->
    <div class="overlay" id="loadingOverlay">
        <div id="loadingText" class="loader-box">Loading..</div>
    </div>

    <!-- Snackbar -->
    <div class="snackbar" id="snackbar">Done</div>

    <!-- Dialogue Box -->
    <div class="barrier hidden" id="payment">
        <div class="floatingWindow">
            <div style="margin-bottom: 15px; font-weight: bold; font-size: 16px;">Mode of Payment:</div>
            <div style="margin-bottom: 10px;">
                <label style="margin-right: 15px;">
                    <input type="radio" name="creditMode" value="Cash" checked> Cash
                </label>
                <label>
                    <input type="radio" name="creditMode" value="Online"> Online
                </label>
            </div>
            <button id="creditSubmitBtn"
                style="width: 100%; padding: 8px; background: #4CAF50; color: white; border: none; border-radius: 4px; cursor: pointer;">Submit</button>
            <button id="creditCancelBtn"
                style="width: 100%; padding: 8px; background: #4c77af; color: white; border: none; border-radius: 4px; cursor: pointer;">Cancel</button>
        </div>
    </div>

    <div id="screenContainer">
        <!-- Credit Screen -->
        <div class="scrn active" id="creditListScrn">
            <input autocomplete="off" type="text" id="creditSearch" style="width: 100%;" placeholder="Search"
                onkeyup="creditSearch()"><br>
            <div class="tableDiv">
                <table>
                    <thead>
                        <tr>
                            <th>Sl No</th>
                            <th>Name</th>
                            <th>CID Number</th>
                            <th>Phone Number</th>
                            <th>Amount</th>
                            <th>Date</th>
                            <th>Time</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="creditListBody">
                    </tbody>
                    <tfoot>
                        <tr class="totalRow">
                            <td colspan="4">Total</td>
                            <td id="creditListTotal">0</td>
                            <td colspan="3"></td>
                        </tr>
                    </tfoot>
                </table>
            </div>
        </div>
    </div>
    <!-- <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script> -->
    <script src="./functions.js"></script>
    <script src="./script.js"></script>
</body>

</html>
